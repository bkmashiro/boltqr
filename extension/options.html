<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BoltQR 设置</title>
</head>
<body>
  <main id="app">
    <h1>BoltQR 设置</h1>
    <p class="muted">配置识别后的动作和本地密码候选 helper。默认只在图片角落放一个小角标；点击角标可打开二维码链接，非链接内容会复制。</p>

    <label>
      Helper endpoint
      <input id="endpoint" type="url" placeholder="http://127.0.0.1:17321" />
    </label>

    <label>
      Bearer token
      <input id="token" type="password" autocomplete="off" placeholder="helper-token.txt 中的 token" />
    </label>

    <section class="group">
      <h2>上传与上报</h2>
      <label class="check">
        <input id="enabled" type="checkbox" />
        启用候选上报
      </label>

      <label class="check">
        <input id="manualOnly" type="checkbox" />
        仅手动右键识别时上报
      </label>

      <label class="check">
        <input id="candidateSearchEnabled" type="checkbox" />
        扫描页面文本提取候选（关闭后不再扫描正文，候选列表清空）
      </label>
    </section>

    <section class="group">
      <h2>识别后的交互</h2>
      <label>
        结果展示方式
        <select id="resultDisplayMode">
          <option value="inline">仅图片角标</option>
          <option value="toast">仅 Toast 提示</option>
          <option value="both">图片角标 + Toast</option>
        </select>
        <span class="hint">图片角标不展开面板：点击打开链接 / 复制非链接文本；Toast 显示完整识别摘要。</span>
      </label>

      <label>
        打开链接行为
        <select id="openBehavior">
          <option value="new-tab">新标签页</option>
          <option value="same-tab">当前页</option>
        </select>
        <span class="hint">作用于点击图片角标时的链接打开方式。</span>
      </label>

      <label class="check">
        <input id="inlineOverlayEnabled" type="checkbox" />
        启用图片角标（右上角 QR✓）
      </label>

      <label class="check">
        <input id="grayQrOnResult" type="checkbox" />
        识别成功后淡化二维码图片
      </label>

      <label class="check">
        <input id="showHelperStatusInResult" type="checkbox" />
        在面板显示 helper 上报状态
      </label>
    </section>

    <div class="actions">
      <button id="save">保存</button>
      <button id="test" type="button">测试连接</button>
    </div>

    <pre id="status" aria-live="polite"></pre>
  </main>
  <script type="module" src="./options.js"></script>
</body>
</html>
