<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BoltQR 设置</title>
</head>
<body>
  <main id="app">
    <h1>BoltQR 设置</h1>
    <p class="muted">配置本地密码候选 helper。BoltQR 只向 localhost 发送二维码页面中提取的候选。</p>

    <label>
      Helper endpoint
      <input id="endpoint" type="url" placeholder="http://127.0.0.1:17321" />
    </label>

    <label>
      Bearer token
      <input id="token" type="password" autocomplete="off" placeholder="helper-token.txt 中的 token" />
    </label>

    <section class="group">
      <h2>上传与上报</h2>
      <label class="check">
        <input id="enabled" type="checkbox" />
        启用候选上报
      </label>

      <label class="check">
        <input id="manualOnly" type="checkbox" />
        仅手动右键识别时上报
      </label>

      <label class="check">
        <input id="candidateSearchEnabled" type="checkbox" />
        扫描页面文本提取候选（关闭后不再扫描正文，候选列表清空）
      </label>
    </section>

    <section class="group">
      <h2>结果展示</h2>
      <label>
        结果展示方式
        <select id="resultDisplayMode">
          <option value="inline">仅内嵌面板</option>
          <option value="toast">仅 Toast 提示</option>
          <option value="both">内嵌面板 + Toast</option>
        </select>
      </label>

      <label>
        打开链接行为
        <select id="openBehavior">
          <option value="new-tab">新标签页</option>
          <option value="same-tab">当前页</option>
        </select>
      </label>

      <label class="check">
        <input id="inlineOverlayEnabled" type="checkbox" />
        启用二维码内嵌结果面板
      </label>

      <label class="check">
        <input id="grayQrOnResult" type="checkbox" />
        面板显示灰色蒙层
      </label>

      <label class="check">
        <input id="showHelperStatusInResult" type="checkbox" />
        在面板显示 helper 上报状态
      </label>
    </section>

    <div class="actions">
      <button id="save">保存</button>
      <button id="test" type="button">测试连接</button>
    </div>

    <pre id="status" aria-live="polite"></pre>
  </main>
  <script type="module" src="./options.js"></script>
</body>
</html>
